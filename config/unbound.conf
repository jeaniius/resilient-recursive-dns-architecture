# Unbound Configuration for Resilient Recursive DNS Architecture
# Location: /etc/unbound/unbound.conf or /etc/unbound/unbound.conf.d/local.conf
# This configuration provides a secure, privacy-focused recursive DNS resolver

server:
    # Network configuration
    port: 5335
    interface: 127.0.0.1
    interface: ::1
    
    # Access control
    access-control: 127.0.0.0/8 allow
    access-control: ::1 allow
    
    # Performance tuning
    num-threads: 4
    msg-cache-size: 100m
    rrset-cache-size: 200m
    
    # Security and privacy settings
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    unwanted-reply-threshold: 10000000
    use-caps-for-id: yes
    
    # DNSSEC validation
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    trust-anchor-signaling: yes
    root-key-sentinel: yes
    
    # Privacy settings
    hide-identity: yes
    hide-version: yes
    hide-http-user-agent: yes
    identity: "DNS"
    version: "1.0"
    
    # Logging
    logfile: "/var/log/unbound/unbound.log"
    log-queries: no
    log-replies: no
    log-tag-queryreply: no
    
    # Root hints
    root-hints: "/var/lib/unbound/root.hints"
    
    # Forward all queries to upstream (uncomment if needed)
    # forward-zone:
    #     name: "."
    #     forward-addr: 127.0.0.1@5335

# Optional: Configure forward zones for specific domains
# forward-zone:
#     name: "example.com."
#     forward-addr: 8.8.8.8
#     forward-addr: 8.8.4.4